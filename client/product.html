<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<link rel="icon" type="image/png" href="/images/Fichier 2.png"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>تفاصيل المنتج — بطاقات الوصفات</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
  :root{
    --cream:#EEF4FB;--warm:#D6E4F7;--clay:#5B9BD5;--earth:#2563EB;
    --deep:#0D1B2A;--green:#4A7C59;--green-bg:#E8F0EA;
    --red:#C0392B;--white:#FFF;
    --shadow:0 4px 24px rgba(13,27,42,.10);--shadow-h:0 8px 40px rgba(13,27,42,.18);
    --r:16px;--rs:8px;--tr:all .3s cubic-bezier(.4,0,.2,1);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Cairo',sans-serif;background:var(--cream);color:var(--deep);min-height:100vh;direction:rtl;font-size:15px;line-height:1.6}

  .top-banner{background:linear-gradient(135deg,var(--earth),#1E3A5F);color:#fff;text-align:center;padding:13px 5vw;font-size:1.05rem;font-weight:900;position:fixed;top:0;left:0;right:0;z-index:101}
  header{background:var(--deep);padding:0 5vw;display:flex;align-items:center;justify-content:space-between;height:68px;position:fixed;top:48px;left:0;right:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.25)}
  .back-link{display:flex;align-items:center;gap:8px;color:var(--clay);text-decoration:none;font-size:.9rem;font-weight:600;transition:color .2s;white-space:nowrap}
  .back-link:hover{color:#fff}
  .logo{display:flex;align-items:center;gap:10px;text-decoration:none}
  .logo img{height:90px;width:auto;object-fit:contain;margin-top:40px}
  .cart-btn{display:flex;align-items:center;gap:8px;background:var(--clay);color:var(--deep);border:none;padding:10px 20px;border-radius:100px;font-family:'Cairo',sans-serif;font-weight:500;font-size:.9rem;cursor:pointer;transition:var(--tr)}
  .cart-btn:hover{background:#7ab3e0}
  .cart-count{background:var(--deep);color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:600}

  main{padding-top:116px}

  /* HERO IMAGE */
  .hero-wrap{background:var(--white);overflow:hidden;position:relative}
  .main-img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;transition:opacity .3s,transform .18s ease;transform-origin:center;will-change:transform}
  .img-placeholder{width:100%;aspect-ratio:1/1;background:linear-gradient(135deg,var(--warm),#C0D8F0);display:flex;align-items:center;justify-content:center;color:var(--clay)}
  .arrow-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.82);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);color:#1a2b3a;border:none;border-radius:50%;width:40px;height:40px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;transition:all .18s;box-shadow:0 2px 12px rgba(0,0,0,.15);padding:0}
  .arrow-btn:hover,.arrow-btn:active{background:#fff;box-shadow:0 4px 20px rgba(0,0,0,.22);transform:translateY(-50%) scale(1.08)}
  .arrow-prev{left:12px}
  .arrow-next{right:12px}

  /* THUMBNAIL STRIP */
  .thumb-strip{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;padding:14px 5vw;background:var(--white);border-top:1px solid var(--warm)}
  .thumb{width:76px;height:76px;border-radius:10px;object-fit:cover;cursor:pointer;border:2.5px solid transparent;transition:border-color .2s,transform .2s;flex-shrink:0}
  .thumb.active{border-color:var(--earth);transform:scale(1.05)}

  /* CONTENT */
  .product-content{max-width:860px;margin:0 auto;padding:36px 5vw 80px}

  .product-title{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:900;margin-bottom:12px;line-height:1.25}
  .product-meta{display:flex;align-items:center;gap:20px;margin-bottom:28px;flex-wrap:wrap}
  .price-big{font-size:2rem;font-weight:700;color:var(--earth);display:flex;align-items:baseline;gap:8px}
  .price-big span{font-size:1rem;color:#aaa;font-weight:400;margin-right:4px}
  .price-original{font-size:1.1rem;font-weight:400;color:#aaa;text-decoration:line-through}
  .stock-pill{font-size:.82rem;color:var(--green);background:var(--green-bg);padding:5px 16px;border-radius:100px;font-weight:600}
  .no-stock{color:var(--red);background:#fdecea}

  .section-lbl{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--clay);margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .section-lbl::after{content:'';flex:1;height:1px;background:var(--warm)}

  .desc-box{background:var(--white);border-radius:var(--r);padding:24px 28px;margin-bottom:28px;line-height:1.9;color:#3a5070;font-size:1rem;box-shadow:var(--shadow)}
  .desc-box p{margin:0 0 8px}
  .desc-box ul,.desc-box ol{padding-right:20px;padding-left:0;margin:6px 0}
  .desc-box li{margin-bottom:4px}
  .desc-box strong,.desc-box b{font-weight:700;color:var(--deep)}
  .desc-box u{text-decoration:underline}

  .add-section{background:var(--white);border-radius:var(--r);padding:28px;box-shadow:var(--shadow)}
  .qty-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:20px}
  .qty-lbl{font-size:.9rem;font-weight:600;color:#4a6080}
  .qty-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--clay);background:transparent;color:var(--earth);font-size:1.2rem;cursor:pointer;transition:var(--tr);display:flex;align-items:center;justify-content:center;font-weight:700;line-height:1}
  .qty-btn:hover{background:var(--clay);color:#fff}
  .qty-input{width:60px;text-align:center;border:1.5px solid var(--warm);border-radius:var(--rs);padding:6px;font-family:'Cairo',sans-serif;font-size:1.1rem;font-weight:600;color:var(--deep);background:var(--cream)}
  .qty-input:focus{outline:none;border-color:var(--clay)}
  .add-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--earth),var(--deep));color:#fff;border:none;border-radius:var(--rs);font-family:'Cairo',sans-serif;font-size:1.1rem;font-weight:700;cursor:pointer;transition:var(--tr);display:flex;align-items:center;justify-content:center;gap:10px;margin-top:4px}
  .add-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(37,99,235,.35)}
  .add-btn.added{background:var(--green)}
  .add-btn:disabled{background:#ccc;transform:none;cursor:not-allowed}

  /* CART SIDEBAR */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}
  .overlay.open{opacity:1;pointer-events:all}
  .cart-sidebar{position:fixed;top:0;right:-480px;width:min(480px,100vw);height:100vh;background:var(--white);z-index:300;display:flex;flex-direction:column;transition:right .4s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 40px rgba(0,0,0,.15)}
  .cart-sidebar.open{right:0}
  .cart-header{padding:24px;border-bottom:1px solid var(--warm);display:flex;align-items:center;justify-content:space-between;background:var(--cream)}
  .cart-header h2{font-family:'Cairo',sans-serif;font-size:1.4rem}
  .close-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--warm);background:#fff;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;transition:var(--tr);color:var(--deep)}
  .close-btn:hover{background:var(--warm)}
  .cart-items{flex:1;overflow-y:auto;padding:20px}
  .cart-empty{text-align:center;padding:60px 20px;color:#aaa}
  .cart-item{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--warm)}
  .cart-item-img{width:60px;height:60px;border-radius:var(--rs);background:var(--warm);overflow:hidden;flex-shrink:0}
  .cart-item-img img{width:100%;height:100%;object-fit:cover}
  .cart-item-info{flex:1}
  .cart-item-name{font-weight:500;font-size:.9rem}
  .cart-item-price{color:var(--earth);font-size:.85rem;margin-top:2px}
  .cart-item-qty{display:flex;align-items:center;gap:6px}
  .cart-qty-btn{width:26px;height:26px;border-radius:50%;border:1px solid var(--clay);background:transparent;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:var(--tr);line-height:1;color:var(--earth)}
  .cart-qty-btn:hover{background:var(--clay);color:#fff}
  .remove-btn{background:none;border:none;color:#ccc;cursor:pointer;font-size:1.1rem;transition:var(--tr);padding:4px}
  .remove-btn:hover{color:var(--red)}
  .cart-footer{padding:20px 24px;border-top:1px solid var(--warm);background:var(--cream)}
  .cart-total{display:flex;justify-content:space-between;font-size:1.1rem;font-weight:600;margin-bottom:16px}
  .checkout-btn{width:100%;padding:14px;background:var(--earth);color:#fff;border:none;border-radius:var(--rs);font-family:'Cairo',sans-serif;font-size:1rem;font-weight:500;cursor:pointer;transition:var(--tr)}
  .checkout-btn:hover{background:var(--deep)}
  .checkout-btn:disabled{background:#ccc;cursor:not-allowed}

  .toast{position:fixed;bottom:24px;right:24px;background:var(--deep);color:var(--clay);padding:12px 20px;border-radius:var(--rs);font-size:.9rem;transform:translateY(80px);opacity:0;transition:all .3s;z-index:500;max-width:300px}
  .toast.show{transform:translateY(0);opacity:1}
  .spinner{display:inline-block;width:22px;height:22px;border:3px solid var(--warm);border-top-color:var(--clay);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="top-banner">تنظيم وصفاتك الأسبوعية يبدأ من هنا !</div>

<header>
  <a class="logo" href="/client">
    <img src="/images/Fichier 1.png" alt="Logo"/>
  </a>
  <button class="cart-btn" onclick="openCart()">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
    <span class="cart-count" id="cart-count">0</span>
  </button>
</header>

<main id="main-content" style="min-height:100vh;display:flex;align-items:center;justify-content:center">
  <div class="spinner"></div>
</main>

<div class="overlay" id="overlay" onclick="closeCart()"></div>
<div class="cart-sidebar" id="cart-sidebar">
  <div class="cart-header">
    <h2>سلة التسوق</h2>
    <button class="close-btn" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cart-items-list"></div>
  <div class="cart-footer">
    <div class="cart-total"><span>المجموع</span><span id="cart-total-price">0,00 MAD</span></div>
    <button class="checkout-btn" id="checkout-btn" onclick="goToCheckout()" disabled>إتمام الطلب ←</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api';
let product = null, galleryImages = [], currentImgIdx = 0;
let cart = JSON.parse(localStorage.getItem('cart') || '{}');

function saveCart() { localStorage.setItem('cart', JSON.stringify(cart)); }

const pid = new URLSearchParams(location.search).get('id');
if (!pid) location.href = '/client';

async function loadProduct() {
  try {
    const r = await fetch(`${API}/products/${pid}`);
    const d = await r.json();
    if (!d.success) throw new Error();
    product = d.data;
    renderProduct();
  } catch {
    document.getElementById('main-content').innerHTML =
      `<div style="text-align:center;padding:60px 5vw;color:#aaa">
        <p style="font-size:1.2rem;margin-bottom:16px">⚠️ المنتج غير موجود</p>
        <a href="/client" style="color:var(--earth);font-weight:600">العودة إلى المتجر</a>
      </div>`;
  }
}

function renderProduct() {
  const p = product;
  const inStock = p.unitesDispo > 0;
  document.title = `${p.nom} — بطاقات الوصفات`;

  galleryImages = [p.image, ...(p.images || [])].filter(Boolean);
  currentImgIdx = 0;
  const hasImg = galleryImages.length > 0;
  const multiImg = galleryImages.length > 1;
  document.getElementById('main-content').innerHTML = `
    <div style="width:100%">
      <div class="hero-wrap">
        ${hasImg
          ? `<img src="${galleryImages[0]}" alt="${p.nom}" class="main-img" id="main-img"
               onerror="this.style.display='none';document.getElementById('hero-ph').style.display='flex'">`
          : ''}
        <div class="img-placeholder" id="hero-ph" ${hasImg ? 'style="display:none"' : ''}>
          <svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21,15 16,10 5,21"/>
          </svg>
        </div>
        ${multiImg ? `
          <button class="arrow-btn arrow-prev" onclick="shiftImg(-1)" aria-label="Précédent">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <button class="arrow-btn arrow-next" onclick="shiftImg(1)" aria-label="Suivant">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>` : ''}
      </div>

      ${hasImg ? `<div class="thumb-strip">
        ${galleryImages.map((src, i) =>
          `<img src="${src}" class="thumb ${i === 0 ? 'active' : ''}" onclick="switchImg('${src}',this)" alt=""/>`
        ).join('')}
      </div>` : ''}

      <div class="product-content">
<h1 class="product-title">${p.nom}</h1>
        <div class="product-meta">
          <div class="price-big">
            ${p.prixOriginal && p.prixOriginal > p.prix ? `<span class="price-original">${fmt(p.prixOriginal)} MAD</span>` : ''}
            ${fmt(p.prix)} <span>MAD</span>
          </div>
          <span class="stock-pill ${!inStock ? 'no-stock' : ''}">
            ${inStock ? p.unitesDispo + ' في المخزون' : 'نفذ المخزون'}
          </span>
        </div>

        <p class="section-lbl">أضف إلى السلة</p>
        <div class="add-section">
          <div class="qty-row">
            <span class="qty-lbl">الكمية :</span>
            <button class="qty-btn" onclick="changeQty(-1)">−</button>
            <input class="qty-input" type="number" id="qty" value="1" min="1" max="${p.unitesDispo}" ${!inStock ? 'disabled' : ''}/>
            <button class="qty-btn" onclick="changeQty(1)">+</button>
          </div>
          <button class="add-btn" id="add-btn" onclick="addToCart()" ${!inStock ? 'disabled' : ''}>
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
              <line x1="3" y1="6" x2="21" y2="6"/>
              <path d="M16 10a4 4 0 01-8 0"/>
            </svg>
            ${inStock ? 'أضف إلى السلة' : 'نفذ المخزون'}
          </button>
        </div>

        <p class="section-lbl" style="margin-top:28px">الوصف</p>
        <div class="desc-box">${p.description}</div>
      </div>
    </div>`;

  updateCartUI();
  if (hasImg) initGalleryInteractions();
}

function initGalleryInteractions() {
  const wrap = document.querySelector('.hero-wrap');
  const img  = document.getElementById('main-img');
  if (!wrap) return;

  // ── Swipe pour naviguer entre images ──────────────────────
  let swipeX = 0, swipeY = 0, isPinching = false;
  wrap.addEventListener('touchstart', e => {
    isPinching = e.touches.length > 1;
    if (e.touches.length === 1) { swipeX = e.touches[0].clientX; swipeY = e.touches[0].clientY; }
  }, { passive: true });
  wrap.addEventListener('touchend', e => {
    if (isPinching || galleryImages.length < 2 || e.changedTouches.length !== 1) return;
    const dx = e.changedTouches[0].clientX - swipeX;
    const dy = e.changedTouches[0].clientY - swipeY;
    if (Math.abs(dx) > 48 && Math.abs(dx) > Math.abs(dy) * 1.5) shiftImg(dx > 0 ? -1 : 1);
  }, { passive: true });

  // ── Pinch-to-zoom ─────────────────────────────────────────
  if (!img) return;
  let zScale = 1, zStartDist = 0, zStartScale = 1, lastTap = 0;

  img.addEventListener('touchstart', e => {
    if (e.touches.length === 2) { zStartDist = touchDist(e); zStartScale = zScale; isPinching = true; }
    if (e.touches.length === 1) {
      const now = Date.now();
      if (now - lastTap < 280) { zScale = 1; img.style.transform = ''; img.style.transformOrigin = ''; }
      lastTap = now;
    }
  }, { passive: true });

  img.addEventListener('touchmove', e => {
    if (e.touches.length !== 2) return;
    e.preventDefault();
    zScale = Math.min(3.5, Math.max(1, zStartScale * (touchDist(e) / zStartDist)));
    const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    const r  = img.getBoundingClientRect();
    img.style.transformOrigin = `${((cx - r.left) / r.width * 100).toFixed(1)}% ${((cy - r.top) / r.height * 100).toFixed(1)}%`;
    img.style.transform = `scale(${zScale.toFixed(2)})`;
  }, { passive: false });

  img.addEventListener('touchend', e => {
    if (e.touches.length === 0 && zScale < 1.1) { zScale = 1; img.style.transform = ''; img.style.transformOrigin = ''; }
  }, { passive: true });
}

function touchDist(e) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

function switchImg(src, el) {
  currentImgIdx = galleryImages.indexOf(src);
  const main = document.getElementById('main-img');
  if (main) { main.style.opacity = '0'; setTimeout(() => { main.src = src; main.style.opacity = '1'; }, 200); }
  document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
}

function shiftImg(delta) {
  if (!galleryImages.length) return;
  currentImgIdx = (currentImgIdx + delta + galleryImages.length) % galleryImages.length;
  const thumbs = document.querySelectorAll('.thumb');
  switchImg(galleryImages[currentImgIdx], thumbs[currentImgIdx]);
}

function changeQty(d) {
  const inp = document.getElementById('qty');
  if (!inp || !product) return;
  inp.value = Math.max(1, Math.min(product.unitesDispo, parseInt(inp.value) + d));
}

function addToCart() {
  if (!product) return;
  const qty = parseInt(document.getElementById('qty').value) || 1;
  cart[product._id] = cart[product._id]
    ? { product, quantity: Math.min(cart[product._id].quantity + qty, product.unitesDispo) }
    : { product, quantity: qty };
  saveCart(); updateCartUI();
  const btn = document.getElementById('add-btn');
  btn.classList.add('added');
  btn.innerHTML = '✓ تمت الإضافة !';
  setTimeout(() => {
    btn.classList.remove('added');
    btn.innerHTML = `<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>أضف إلى السلة`;
  }, 1800);
  showToast(`"${product.nom}" تمت إضافته إلى السلة`);
}

function updateCartUI() {
  const items = Object.values(cart);
  const totalQty = items.reduce((s, i) => s + i.quantity, 0);
  const totalPrice = items.reduce((s, i) => s + i.product.prix * i.quantity, 0);
  document.getElementById('cart-count').textContent = totalQty;
  document.getElementById('cart-total-price').textContent = `${fmt(totalPrice)} MAD`;
  document.getElementById('checkout-btn').disabled = !items.length;
  const list = document.getElementById('cart-items-list');
  if (!items.length) { list.innerHTML = `<div class="cart-empty"><p>سلة التسوق فارغة</p></div>`; return; }
  list.innerHTML = items.map(({ product: p, quantity }) => `
    <div class="cart-item">
      <div class="cart-item-img">${p.image ? `<img src="${p.image}" alt="${p.nom}">` : ''}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${p.nom}</div>
        <div class="cart-item-price">${fmt(p.prix * quantity)} MAD</div>
      </div>
      <div class="cart-item-qty">
        <button class="cart-qty-btn" onclick="cartQty('${p._id}',-1)">−</button>
        <span style="min-width:24px;text-align:center;font-weight:500">${quantity}</span>
        <button class="cart-qty-btn" onclick="cartQty('${p._id}',1)">+</button>
      </div>
      <button class="remove-btn" onclick="removeItem('${p._id}')">✕</button>
    </div>`).join('');
}

function cartQty(pid, d) {
  if (!cart[pid]) return;
  cart[pid].quantity = Math.max(1, Math.min(cart[pid].quantity + d, cart[pid].product.unitesDispo));
  saveCart(); updateCartUI();
}
function removeItem(pid) { delete cart[pid]; saveCart(); updateCartUI(); }
function openCart() { document.getElementById('cart-sidebar').classList.add('open'); document.getElementById('overlay').classList.add('open'); }
function closeCart() { document.getElementById('cart-sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }
function goToCheckout() { location.href = '/client?checkout=1'; }
function fmt(n) { return Number(n).toFixed(2).replace('.', ','); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

loadProduct();
updateCartUI();
