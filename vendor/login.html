<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Connexion — Espace Vendeur</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Epilogue:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root{
    --bg:#080E1A;--bg2:#0C1525;--bg3:#132030;
    --b:rgba(96,165,250,.10);--b2:rgba(96,165,250,.2);
    --text:#EEF2FF;--muted:#7A8FA6;
    --blue:#60A5FA;--blue2:#2563EB;
    --red:#E05A5A;--rs:8px;--r:14px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Epilogue',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;
    overflow:hidden;
  }

  /* Décoration fond */
  .bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0}
  .bg-glow::before{
    content:'';position:absolute;
    width:700px;height:700px;border-radius:50%;
    background:radial-gradient(circle,rgba(37,99,235,.12) 0%,transparent 65%);
    top:-250px;right:-200px;
  }
  .bg-glow::after{
    content:'';position:absolute;
    width:500px;height:500px;border-radius:50%;
    background:radial-gradient(circle,rgba(96,165,250,.07) 0%,transparent 65%);
    bottom:-150px;left:-100px;
  }

  .wrap{position:relative;z-index:1;width:100%;max-width:420px;padding:24px}

  .brand{text-align:center;margin-bottom:36px}
  .brand-icon{
    width:52px;height:52px;border-radius:14px;
    background:linear-gradient(135deg,var(--blue),var(--blue2));
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 14px;
    box-shadow:0 8px 24px rgba(37,99,235,.35);
  }
  .brand-name{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:700;color:var(--text)}
  .brand-sub{font-size:.7rem;color:var(--muted);margin-top:4px;letter-spacing:.12em;text-transform:uppercase}

  .card{
    background:var(--bg2);
    border:1px solid var(--b2);
    border-radius:var(--r);
    padding:36px;
    box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 0 1px rgba(96,165,250,.05);
  }

  .card-title{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:700;margin-bottom:5px}
  .card-sub{font-size:.82rem;color:var(--muted);margin-bottom:28px}

  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:18px}
  .field label{font-size:.73rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:500}
  .field input{
    padding:12px 14px;
    border:1px solid var(--b2);
    border-radius:var(--rs);
    background:var(--bg3);
    color:var(--text);
    font-family:'Epilogue',sans-serif;
    font-size:.93rem;
    outline:none;
    transition:border-color .2s,box-shadow .2s;
  }
  .field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(96,165,250,.12)}
  .field input.err{border-color:var(--red)}
  .field input::placeholder{color:rgba(120,140,170,.4)}

  .error-box{
    font-size:.8rem;color:var(--red);
    background:rgba(224,90,90,.1);
    border:1px solid rgba(224,90,90,.25);
    border-radius:var(--rs);
    padding:10px 14px;
    margin-bottom:18px;
    display:none;
    align-items:center;gap:8px;
  }
  .error-box.show{display:flex}

  .btn{
    width:100%;padding:13px;
    background:linear-gradient(135deg,var(--blue),var(--blue2));
    color:#fff;border:none;border-radius:var(--rs);
    font-family:'Syne',sans-serif;font-size:.93rem;font-weight:600;
    cursor:pointer;transition:all .2s;letter-spacing:.03em;margin-top:4px;
  }
  .btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(37,99,235,.4)}
  .btn:disabled{opacity:.6;transform:none;cursor:not-allowed}

  .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .back-link{display:block;text-align:center;margin-top:20px;font-size:.78rem;color:var(--muted);text-decoration:none;transition:color .2s}
  .back-link:hover{color:var(--blue)}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="wrap">
  <div class="brand">
    <img src="/images/Fichier 1.png" alt="Cartes & Recettes" style="width:250px;height:auto;object-fit:contain;filter:brightness(0) invert(1);display:block;margin:0 auto 2px"/>
  </div>

  <div class="card">
    <div class="card-title">Connexion</div>
    <p class="card-sub">Accès réservé aux gestionnaires de la boutique</p>

    <div class="error-box" id="err">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="err-text">Identifiants incorrects</span>
    </div>

    <div class="field">
      <label>Nom complet</label>
      <input type="text" id="nom" autocomplete="username"/>
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="pwd" placeholder="••••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>

    <button class="btn" id="login-btn" onclick="doLogin()">Se connecter</button>
  </div>

</div>

<script>
// Rediriger si déjà connecté
const tok = localStorage.getItem('vendorToken');
if (tok) {
  fetch('/api/auth/check', { headers: { Authorization: 'Bearer ' + tok } })
    .then(r => r.json())
    .then(d => { if (d.success) window.location.href = '/vendor/index.html'; })
    .catch(() => {});
}

async function doLogin() {
  const nom = document.getElementById('nom').value.trim();
  const pwd = document.getElementById('pwd').value;
  const errEl = document.getElementById('err');
  const btn   = document.getElementById('login-btn');

  errEl.classList.remove('show');
  ['nom','pwd'].forEach(id => document.getElementById(id).classList.remove('err'));

  if (!nom || !pwd) {
    if (!nom) document.getElementById('nom').classList.add('err');
    if (!pwd) document.getElementById('pwd').classList.add('err');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Connexion…';

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nomComplet: nom, motDePasse: pwd })
    });
    const data = await r.json();
    if (data.success) {
      localStorage.setItem('vendorToken', data.token);
      localStorage.setItem('vendorNom', data.nom);
      window.location.href = '/vendor/index.html';
    } else {
      document.getElementById('err-text').textContent = data.message || 'Identifiants incorrects';
      errEl.classList.add('show');
      ['nom','pwd'].forEach(id => document.getElementById(id).classList.add('err'));
    }
  } catch {
    document.getElementById('err-text').textContent = 'Impossible de joindre le serveur';
    errEl.classList.add('show');
  }

  btn.disabled = false;
  btn.textContent = 'Se connecter';
}
</script>
</body>
</html>
